<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – Sidan hittades inte | Vericount Designsystem</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Epilogue:wght@600&family=Inter:wght@400;500&display=swap" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9f7f5;
        color: #19342b;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        text-align: center;
        padding: 0 24px;
      }
      .code {
        font-size: 0.875rem;
        font-weight: 500;
        color: #27685b;
        margin-bottom: 8px;
      }
      h1 {
        font-family: 'Epilogue', sans-serif;
        font-size: 1.875rem;
        font-weight: 600;
        margin: 0 0 12px;
      }
      p {
        color: #5c8a7a;
        margin: 0 0 24px;
      }
      a {
        font-size: 0.875rem;
        font-weight: 500;
        color: #27685b;
        text-decoration: none;
        transition: opacity 0.2s;
      }
      a:hover { opacity: 0.7; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Sidan hittades inte</h1>
      <p>Sidan du letar efter finns inte eller har flyttats.</p>
      <a href="/">&#8592; Tillbaka till designsystemet</a>
