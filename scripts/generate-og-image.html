<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Epilogue', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a4a3f 0%, #27685b 40%, #1f5548 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    /* Subtle gradient orbs */
    .orb1 {
      position: absolute;
      top: -80px;
      right: -60px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(228, 103, 124, 0.08);
      filter: blur(80px);
    }
    .orb2 {
      position: absolute;
      bottom: -100px;
      left: -80px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      filter: blur(100px);
    }
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 32px;
      opacity: 0.95;
    }
    h1 {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }
    p {
      font-size: 22px;
      font-weight: 400;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }
    .badge {
      display: inline-block;
      margin-top: 28px;
      padding: 6px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0.5;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="content">
    <!-- Inline SVG approximation of the Vericount icon -->
    <svg class="logo" viewBox="0 0 100 100" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 10 C25 10 10 30 10 55 C10 75 25 90 50 90 C75 90 90 75 90 55 C90 30 75 10 50 10 Z M50 18 C70 18 82 33 82 55 C82 71 70 82 50 82 C30 82 18 71 18 55 C18 33 30 18 50 18 Z M30 40 L50 60 L70 40 L62 40 L50 52 L38 40 Z" />
    </svg>
    <h1>Vericount Designsystem</h1>
    <p>Visuell identitet, komponenter och riktlinjer</p>
    <span class="badge">design.vericount.se</span>
  </div>
</body>
</html>
